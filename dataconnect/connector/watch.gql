# Inserts a media item into the watchlist for the current user with metadata
mutation AddToWishlist($mediaType: String!, $tmdbId: String, $malId: String, $title: String, $posterUrl: String, $releaseYear: Int) {
  watchlistItem_upsert(data: {
    user: { id_expr: "auth.uid" },
    mediaType: $mediaType,
    movieId: {
      tmdbId: $tmdbId,
      title: $title,
      posterUrl: $posterUrl,
      releaseYear: $releaseYear
    },
    animeId: {
      malId: $malId,
      title: $title,
      posterUrl: $posterUrl,
      releaseYear: $releaseYear
    }
  })
}

# Deletes a media item from the watchlist for the current user
mutation RemoveFromWishlist($mediaType: String!, $movieId: Movie_Key, $animeId: Anime_Key) {
  watchlistItem_delete(key: {
    user: { id_expr: "auth.uid" },
    mediaType: $mediaType,
    movieId: $movieId,
    animeId: $animeId
  })
}

# Fetches the entire watchlist for the current user (RLS enforced)
query GetWishlist {
  watchlistItems(where: { user: { id: { eq_expr: "auth.uid" } } }) {
    mediaType
    movieId { tmdbId title posterUrl }
    animeId { malId title posterUrl }
    addedAt
  }
}

# Inserts or updates a watch history record for the current user with metadata
mutation AddToHistory($mediaType: String!, $tmdbId: String, $malId: String, $title: String, $posterUrl: String, $releaseYear: Int) {
  watchHistory_upsert(data: {
    user: { id_expr: "auth.uid" },
    mediaType: $mediaType,
    movieId: {
      tmdbId: $tmdbId,
      title: $title,
      posterUrl: $posterUrl,
      releaseYear: $releaseYear
    },
    animeId: {
      malId: $malId,
      title: $title,
      posterUrl: $posterUrl,
      releaseYear: $releaseYear
    },
    watchedAt_expr: "request.time"
  })
}

# Deletes a specific history record for the current user
mutation RemoveFromHistory($mediaType: String!, $movieId: Movie_Key, $animeId: Anime_Key) {
  watchHistory_delete(key: {
    user: { id_expr: "auth.uid" },
    mediaType: $mediaType,
    movieId: $movieId,
    animeId: $animeId
  })
}

# Clears ALL history for the current user
mutation ClearHistory {
  watchHistory_deleteMany(where: { user: { id: { eq_expr: "auth.uid" } } })
}

# Clears ALL wishlist items for the current user
mutation ClearWishlist {
  watchlistItem_deleteMany(where: { user: { id: { eq_expr: "auth.uid" } } })
}

# Fetches the watch history for the current user (RLS enforced)
query GetHistory {
  watchHistories(where: { user: { id: { eq_expr: "auth.uid" } } }, orderBy: [{ watchedAt: DESC }]) {
    mediaType
    movieId { tmdbId title posterUrl }
    animeId { malId title posterUrl }
    watchedAt
  }
}
